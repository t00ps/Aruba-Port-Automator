name: Aruba-Port-Automator

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Pobranie kodu z repozytorium
      uses: actions/checkout@v3

    - name: 2. Przygotowanie środowiska Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: 3. Instalacja zależności i Lintera
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 4. Testowanie kodu w Pythonie (Flake8)
      run: |
        # Flake8 sprawdzi Twój kod pod kątem krytycznych błędów składniowych
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: 5. Próbne budowanie obrazu Docker
      run: |
        docker build -t arubauth:latest .
